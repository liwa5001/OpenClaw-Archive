<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 成长堡每日复盘</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .date-picker {
            margin-top: 15px;
        }
        
        .date-picker input[type="date"] {
            padding: 8px 15px;
            border-radius: 20px;
            border: 2px solid rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 14px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
        }
        
        .date-picker input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
        
        .date-picker input[type="date"]:focus {
            background: rgba(255,255,255,0.3);
            border-color: rgba(255,255,255,0.8);
        }
        
        .week-badge {
            display: inline-block;
            background: rgba(255,255,255,0.3);
            padding: 6px 12px;
            border-radius: 15px;
            margin-top: 8px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .form-body {
            padding: 30px 20px;
        }
        
        .section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        
        .section:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }
        
        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            color: #555;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .radio-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .radio-option {
            flex: 1;
            min-width: 60px;
        }
        
        .radio-option input {
            display: none;
        }
        
        .radio-option label {
            display: block;
            padding: 10px;
            text-align: center;
            background: #f5f5f5;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
        }
        
        .radio-option input:checked + label {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        @media (max-width: 480px) {
            .row {
                grid-template-columns: 1fr;
            }
        }
        
        .learning-block {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        
        .learning-block h4 {
            font-size: 15px;
            color: #667eea;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .submit-btn:active {
            transform: translateY(0);
        }
        
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .success-message {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }
        
        .success-message.show {
            display: block;
        }
        
        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        .success-message h2 {
            font-size: 24px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .success-message p {
            color: #666;
            font-size: 16px;
        }
        
        .hidden {
            display: none;
        }
        
        .hint {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
        
        .progress-text {
            font-size: 13px;
            color: #667eea;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 成长堡每日复盘</h1>
            <p>记录今天的学习成长</p>
            <div class="date-picker">
                <input type="date" id="datePicker" name="date" onchange="updateWeekInfo()">
            </div>
            <div class="week-badge" id="weekInfo"></div>
        </div>
        
        <div class="form-body">
            <form id="growthForm">
                <input type="hidden" id="weekNum" name="week_num">
                <input type="hidden" id="dayInWeek" name="day_in_week">
                
                <!-- 学习状态 -->
                <div class="section">
                    <div class="section-title">
                        <span>📖</span>
                        <span>今日学习</span>
                    </div>
                    
                    <div class="form-group">
                        <label>今天学习了吗？</label>
                        <div class="radio-group">
                            <div class="radio-option">
                                <input type="radio" name="study_status" id="study_no" value="0" onchange="toggleStudyFields()">
                                <label for="study_no">😴 未学习</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" name="study_status" id="study_yes" value="1" onchange="toggleStudyFields()" checked>
                                <label for="study_yes">✅ 有学习</label>
                            </div>
                        </div>
                    </div>
                    
                    <div id="studyFields">
                        <div class="learning-block">
                            <h4>🏰 OpenClaw</h4>
                            <div class="row">
                                <div class="form-group">
                                    <label>学习时长（分钟）</label>
                                    <input type="number" name="oc_duration" id="oc_duration" placeholder="45" min="0">
                                </div>
                                <div class="form-group">
                                    <label>学习内容</label>
                                    <input type="text" name="oc_content" id="oc_content" placeholder="例：OC-02 视频 P3-P5">
                                </div>
                            </div>
                        </div>
                        
                        <div class="learning-block">
                            <h4>🤖 Claude AI</h4>
                            <div class="row">
                                <div class="form-group">
                                    <label>学习时长（分钟）</label>
                                    <input type="number" name="claude_duration" id="claude_duration" placeholder="30" min="0">
                                </div>
                                <div class="form-group">
                                    <label>学习内容</label>
                                    <input type="text" name="claude_content" id="claude_content" placeholder="例：Prompt 模板练习">
                                </div>
                            </div>
                        </div>
                        
                        <div class="learning-block">
                            <h4>🎬 视频制作</h4>
                            <div class="row">
                                <div class="form-group">
                                    <label>学习时长（分钟）</label>
                                    <input type="number" name="video_duration" id="video_duration" placeholder="20" min="0">
                                </div>
                                <div class="form-group">
                                    <label>学习内容</label>
                                    <input type="text" name="video_content" id="video_content" placeholder="例：PR 基础 P1-P2">
                                </div>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>总学习时长（自动计算）</label>
                            <input type="text" id="totalDuration" readonly placeholder="0 分钟">
                            <div class="progress-text" id="progressText">日目标：90 分钟 | 周目标：630 分钟</div>
                        </div>
                    </div>
                </div>
                
                <!-- 学习质量 -->
                <div class="section">
                    <div class="section-title">
                        <span>⭐</span>
                        <span>学习质量</span>
                    </div>
                    
                    <div class="form-group">
                        <label>今日学习质量自评</label>
                        <div class="radio-group">
                            <div class="radio-option">
                                <input type="radio" name="quality_rating" id="quality_1" value="1">
                                <label for="quality_1">1<br>很差</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" name="quality_rating" id="quality_2" value="2">
                                <label for="quality_2">2<br>一般</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" name="quality_rating" id="quality_3" value="3" checked>
                                <label for="quality_3">3<br>不错</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" name="quality_rating" id="quality_4" value="4">
                                <label for="quality_4">4<br>很好</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" name="quality_rating" id="quality_5" value="5">
                                <label for="quality_5">5<br>完美</label>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 今日产出 -->
                <div class="section">
                    <div class="section-title">
                        <span>📝</span>
                        <span>今日产出</span>
                    </div>
                    
                    <div class="row">
                        <div class="form-group">
                            <label>学习笔记（页）</label>
                            <input type="number" name="output_notes" id="output_notes" placeholder="2" min="0">
                        </div>
                        <div class="form-group">
                            <label>实操练习（次）</label>
                            <input type="number" name="output_practice" id="output_practice" placeholder="3" min="0">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>作品/代码（个）</label>
                        <input type="number" name="output_projects" id="output_projects" placeholder="0" min="0">
                        <div class="hint">如：完成的脚本、视频、文档等</div>
                    </div>
                </div>
                
                <!-- 问题与计划 -->
                <div class="section">
                    <div class="section-title">
                        <span>💡</span>
                        <span>问题与计划</span>
                    </div>
                    
                    <div class="form-group">
                        <label>遇到的问题</label>
                        <textarea name="problems" id="problems" placeholder="今天遇到了什么困难？（如无，填"无"）"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>明日计划调整</label>
                        <textarea name="tomorrow_plan" id="tomorrow_plan" placeholder="明天打算如何调整学习计划？（可选）"></textarea>
                    </div>
                </div>
                
                <!-- 提交按钮 -->
                <button type="submit" class="submit-btn" id="submitBtn">
                    提交复盘 🚀
                </button>
            </form>
            
            <!-- 成功消息 -->
            <div class="success-message" id="successMessage">
                <div class="success-icon">✅</div>
                <h2>复盘已提交！</h2>
                <p>感谢你的记录，成长堡正在分析数据...</p>
                <p style="margin-top: 20px; font-size: 14px; color: #999;">
                    稍后会在飞书收到评分和建议
                </p>
            </div>
        </div>
    </div>
    
    <script>
        // 设置日期和周数
        function setDate() {
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            
            // 设置日期选择器默认值为昨天
            const dateStr = yesterday.toISOString().split('T')[0];
            document.getElementById('datePicker').value = dateStr;
            
            updateWeekInfo();
            updateTotalDuration();
        }
        
        // 更新周信息
        function updateWeekInfo() {
            const selectedDate = new Date(document.getElementById('datePicker').value);
            const startDate = new Date('2026-03-09');
            
            const diffTime = selectedDate - startDate;
            const daysElapsed = Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1;
            const weekNum = Math.floor((daysElapsed - 1) / 7) + 1;
            const dayInWeek = ((daysElapsed - 1) % 7) + 1;
            
            document.getElementById('weekInfo').textContent = `第 ${weekNum} 周 第 ${dayInWeek} 天`;
            
            // 更新隐藏字段
            document.getElementById('weekNum').value = weekNum;
            document.getElementById('dayInWeek').value = dayInWeek;
        }
        
        // 切换学习字段
        function toggleStudyFields() {
            const isNotStudying = document.getElementById('study_no').checked;
            const fields = document.getElementById('studyFields');
            fields.classList.toggle('hidden', isNotStudying);
        }
        
        // 计算总时长
        function updateTotalDuration() {
            const oc = parseInt(document.getElementById('oc_duration').value) || 0;
            const claude = parseInt(document.getElementById('claude_duration').value) || 0;
            const video = parseInt(document.getElementById('video_duration').value) || 0;
            const total = oc + claude + video;
            
            document.getElementById('totalDuration').value = total + ' 分钟';
            
            // 更新进度提示
            const dailyTarget = 90;
            const weeklyTarget = 630;
            const progressText = document.getElementById('progressText');
            
            if (total >= dailyTarget) {
                progressText.textContent = `✅ 日目标达成！(${total}/${dailyTarget}min)`;
                progressText.style.color = '#22c55e';
            } else {
                progressText.textContent = `日目标：${dailyTarget}分钟 | 当前：${total}分钟`;
                progressText.style.color = '#667eea';
            }
        }
        
        // 监听输入变化
        ['oc_duration', 'claude_duration', 'video_duration'].forEach(id => {
            document.getElementById(id).addEventListener('input', updateTotalDuration);
        });
        
        // 表单提交
        document.getElementById('growthForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const successMsg = document.getElementById('successMessage');
            const form = document.getElementById('growthForm');
            
            // 禁用按钮
            submitBtn.disabled = true;
            submitBtn.textContent = '提交中...';
            
            // 收集表单数据
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            
            // 如果是未学习，设置数据
            if (data.study_status === '0') {
                data.oc_duration = '0';
                data.claude_duration = '0';
                data.video_duration = '0';
                data.total_duration = '0';
            } else {
                const total = (parseInt(data.oc_duration) || 0) + 
                             (parseInt(data.claude_duration) || 0) + 
                             (parseInt(data.video_duration) || 0);
                data.total_duration = total.toString();
            }
            
            try {
                // 发送到服务器（使用相对路径，自动适配当前服务器地址）
                const response = await fetch('/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data),
                    signal: AbortSignal.timeout(30000)
                });
                
                if (response.ok) {
                    // 显示成功消息
                    form.classList.add('hidden');
                    successMsg.classList.add('show');
                } else {
                    throw new Error('提交失败');
                }
            } catch (error) {
                console.error('提交错误:', error);
                // 网络错误，但后台可能已处理
                const retry = confirm('⚠️ 网络超时，但数据可能已提交！\n\n请点击"确定"重试，或点击"取消"检查飞书消息。\n\n如已收到飞书确认，说明提交成功，无需重试。');
                if (retry) {
                    submitBtn.disabled = false;
                    submitBtn.textContent = '提交复盘 🚀';
                } else {
                    submitBtn.disabled = false;
                    submitBtn.textContent = '提交复盘 🚀';
                }
            }
        });
        
        // 初始化
        setDate();
        toggleStudyFields();
    </script>
</body>
</html>
